<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casino Mini App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <!-- Падающие карты на фоне -->
    <div class="falling-cards">
        <div class="falling-card">♠</div>
        <div class="falling-card">♥</div>
        <div class="falling-card">♣</div>
        <div class="falling-card">♦</div>
        <div class="falling-card">♠</div>
        <div class="falling-card">♥</div>
    </div>

    <!-- Золотые частицы -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Неоновые полосы -->
    <div class="neon-strip-left"></div>
    <div class="neon-strip-right"></div>
    <!-- Шапка с балансом -->
    <header class="header">
        <div class="header-content">
            <div class="logo">💎 CASINO</div>
            <div class="balance">
                <span class="balance-label">Баланс:</span>
                <span class="balance-amount" id="balance-amount">0 ₽</span>
            </div>
        </div>
    </header>

    <!-- Главное меню -->
    <div id="main-menu" class="main-menu">
        <h1 class="menu-title">Выберите игру</h1>
        <div class="games-menu">
            <button class="game-btn" id="btn-mines">
                <div class="game-icon">💣</div>
                <div class="game-name">Минное поле</div>
            </button>
            <button class="game-btn" id="btn-roulette">
                <div class="game-icon">🎡</div>
                <div class="game-name">Рулетка</div>
            </button>
            <button class="game-btn" id="btn-slots">
                <div class="game-icon">🎰</div>
                <div class="game-name">Слоты</div>
            </button>
            <button class="game-btn" id="btn-dice">
                <div class="game-icon">🎲</div>
                <div class="game-name">Кости</div>
            </button>
            <button class="game-btn" id="btn-coin">
                <div class="game-icon">🪙</div>
                <div class="game-name">Монетка</div>
            </button>
        </div>
    </div>

    <!-- Экран игры -->
    <div id="game-screen" class="game-screen" style="display: none;">
        <div class="game-header">
            <button class="btn-back" id="btn-back">← Назад</button>
            <h2 class="game-title" id="game-screen-title">Игра</h2>
        </div>
        <div class="game-content" id="game-content"></div>
    </div>

    <script src="casino.js"></script>
</body>
<button onclick="syncNow()" style="
    position: fixed;
    top: 10px;
    right: 10px;
    background: #D4AF37;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    color: #000;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    z-index: 9999;
">
    🔄 СИНХРОНИЗИРОВАТЬ
</button>

<script>
function syncNow() {
    const tg = window.Telegram?.WebApp;
    if (!tg) {
        alert('❌ Telegram WebApp не найден!');
        return;
    }
    
    // Отправляем запрос баланса
    tg.sendData(JSON.stringify({ action: 'get_balance' }));
    alert('📤 Запрос баланса отправлен! Проверь баланс через 2 секунды.');
    
    // Через 2 секунды проверяем
    setTimeout(() => {
        location.reload();
    }, 2000);
}
</script>
</html>
