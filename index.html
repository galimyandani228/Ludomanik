<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ludomaniks Casino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Шапка -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">♠</span>
                <span class="logo-text">LUDOMANIKS</span>
            </div>
            <div class="balance-container">
                <span class="balance-label">💰 БАЛАНС</span>
                <span class="balance-amount" id="balance">0</span>
            </div>
        </header>

        <!-- Главное меню -->
        <div id="mainMenu">
            <div class="menu-grid">
                <button class="game-btn" data-game="mines">
                    <span class="game-icon">💣</span>
                    <span class="game-name">Минное поле</span>
                    <span class="game-desc">x2.5</span>
                </button>
                <button class="game-btn" data-game="roulette">
                    <span class="game-icon">🎡</span>
                    <span class="game-name">Рулетка</span>
                    <span class="game-desc">x14</span>
                </button>
                <button class="game-btn" data-game="slots">
                    <span class="game-icon">🎰</span>
                    <span class="game-name">Слоты</span>
                    <span class="game-desc">x50</span>
                </button>
                <button class="game-btn" data-game="dice">
                    <span class="game-icon">🎲</span>
                    <span class="game-name">Кости</span>
                    <span class="game-desc">x5</span>
                </button>
                <button class="game-btn" data-game="coin">
                    <span class="game-icon">🪙</span>
                    <span class="game-name">Монетка</span>
                    <span class="game-desc">x2</span>
                </button>
            </div>
        </div>

        <!-- Игровое поле -->
        <div id="gameScreen" style="display:none;">
            <div class="game-header">
                <button class="back-btn" id="backBtn">← НАЗАД</button>
                <span class="game-title" id="gameTitle">Игра</span>
            </div>
            <div id="gameContent" class="game-content">
                <!-- Сюда динамически загружается игра -->
            </div>
        </div>

        <!-- Футер -->
        <footer class="footer">
            <span>v1.0</span>
            <span>•</span>
            <span>Виртуальное казино</span>
        </footer>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
